<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Room</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans', sans-serif; background: #313338; color: #dbdee1; display: flex; flex-direction: column; height: 100vh; }
    #loginOverlay { position: fixed; inset: 0; background: #313338; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; z-index: 10; }
    #loginOverlay h1 { font-size: 20px; margin-bottom: 8px; }
    input { background: #1e1f22; border: 1px solid #3f4147; border-radius: 4px; color: #dbdee1; padding: 8px 12px; font-size: 14px; width: 220px; }
    button.sm { padding: 8px 20px; border-radius: 6px; border: none; background: #5865f2; color: #fff; font-size: 14px; cursor: pointer; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .msg { display: flex; gap: 10px; }
    .msg-avatar { width: 36px; height: 36px; border-radius: 50%; background: #5865f2; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
    .msg-body { display: flex; flex-direction: column; gap: 2px; }
    .msg-author { font-size: 13px; font-weight: 600; color: #f2f3f5; }
    .msg-time { font-size: 11px; color: #80848e; margin-left: 6px; }
    .msg-text { font-size: 14px; color: #dbdee1; word-break: break-word; }
    #inputBar { display: flex; gap: 8px; padding: 12px 16px; background: #2b2d31; }
    #chatInput { flex: 1; background: #383a40; border: none; border-radius: 8px; color: #dbdee1; padding: 10px 14px; font-size: 14px; outline: none; }
    #sendBtn { padding: 10px 18px; border-radius: 8px; border: none; background: #5865f2; color: #fff; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>
  <div id="loginOverlay">
    <h1>Chat Room</h1>
    <input id="usernameInput" placeholder="Username" autocomplete="username">
    <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password">
    <button class="sm" id="loginBtn">Join</button>
  </div>
  <div id="messages"></div>
  <div id="inputBar">
    <input id="chatInput" placeholder="Message..." autocomplete="off">
    <button id="sendBtn">Send</button>
  </div>
  <script src="/js/sdk.js"></script>
  <script>
    const sdk = window.ZellousSDK;
    const roomId = new URLSearchParams(location.search).get('room') || 'general';
    const messagesEl = document.getElementById('messages');
    const chatInput = document.getElementById('chatInput');

    function addMessage(username, content, timestamp) {
      const t = timestamp ? new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = `<div class="msg-avatar">${(username||'?')[0].toUpperCase()}</div><div class="msg-body"><div class="msg-author">${username||'Unknown'}<span class="msg-time">${t}</span></div><div class="msg-text">${content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    sdk.on('text_message', ({ username, content, timestamp }) => addMessage(username, content, timestamp));
    sdk.on('message_history', ({ messages }) => { messagesEl.innerHTML = ''; (messages||[]).forEach(m => addMessage(m.username, m.content, m.timestamp)); });

    function sendMessage() {
      const v = chatInput.value.trim();
      if (!v) return;
      sdk.messaging.send(v);
      chatInput.value = '';
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const u = document.getElementById('usernameInput').value.trim();
      const p = document.getElementById('passwordInput').value;
      if (!u) return;
      const r = await sdk.auth.login(u, p);
      if (r.token || r.user) {
        document.getElementById('loginOverlay').style.display = 'none';
        sdk.connect(roomId);
      } else {
        alert(r.error || 'Login failed');
      }
    });
  </script>
</body>
</html>
