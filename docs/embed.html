<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zellous Embedding Example</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #0f1117; color: #c9d1d9; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { margin-top: 0; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .panel { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; }
    iframe { width: 100%; height: 600px; border: none; border-radius: 6px; }
    .controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    button { background: #238636; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:hover { background: #2ea043; }
    .log { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; height: 200px; overflow-y: auto; font-size: 12px; font-family: 'Courier New', monospace; }
    .log-entry { margin: 4px 0; padding: 4px; border-left: 2px solid #6c63ff; padding-left: 8px; }
    .error { border-left-color: #f85149; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Zellous Embedding Example</h1>
    <p>This page demonstrates how to embed Zellous in an iframe and communicate with it via postMessage.</p>

    <div class="layout">
      <div class="panel">
        <h2>Zellous Iframe</h2>
        <iframe id="zelliousFrame" src="./nostr-chat/index.html"></iframe>
      </div>

      <div class="panel">
        <h2>Parent Controls</h2>
        <div class="controls">
          <button onclick="sendGetState()">Get State</button>
          <button onclick="sendJoinRoom()">Join Room</button>
          <button onclick="sendLeaveRoom()">Leave Room</button>
          <button onclick="clearLog()">Clear Log</button>
        </div>

        <h3>Event Log</h3>
        <div class="log" id="eventLog"></div>
      </div>
    </div>
  </div>

  <script>
    const iframe = document.getElementById('zelliousFrame');
    let messageId = 0;
    const pendingRequests = new Map();

    function logEvent(type, data, isError = false) {
      const log = document.getElementById('eventLog');
      const entry = document.createElement('div');
      entry.className = 'log-entry' + (isError ? ' error' : '');
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${type}: ${JSON.stringify(data).substring(0, 100)}`;
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
    }

    function clearLog() {
      document.getElementById('eventLog').innerHTML = '';
    }

    function sendToIframe(type, data = {}) {
      messageId++;
      const id = messageId;
      const msg = { type, data, id };
      iframe.contentWindow.postMessage(msg, '*');
      logEvent(`SENT: ${type}`, data);
      return new Promise((resolve) => {
        pendingRequests.set(id, resolve);
        setTimeout(() => {
          if (pendingRequests.has(id)) {
            pendingRequests.delete(id);
            logEvent('TIMEOUT', type, true);
          }
        }, 5000);
      });
    }

    window.addEventListener('message', (e) => {
      const { type, id, result, error, data } = e.data || {};

      if (type === 'ready') {
        logEvent('READY', 'Zellous is loaded and ready');
      } else if (type === 'response' && id) {
        const resolve = pendingRequests.get(id);
        if (resolve) {
          pendingRequests.delete(id);
          logEvent(`RESPONSE: ${id}`, result);
          resolve(result);
        }
      } else if (type === 'error' && id) {
        const resolve = pendingRequests.get(id);
        if (resolve) {
          pendingRequests.delete(id);
          logEvent(`ERROR: ${id}`, error, true);
          resolve(null);
        }
      } else if (type) {
        logEvent(`EVENT: ${type}`, data);
      }
    });

    async function sendGetState() {
      const state = await sendToIframe('getState');
      logEvent('State retrieved', state);
    }

    async function sendJoinRoom() {
      const result = await sendToIframe('joinRoom', { roomId: 'general' });
      logEvent('Join result', result);
    }

    async function sendLeaveRoom() {
      const result = await sendToIframe('leaveRoom');
      logEvent('Leave result', result);
    }

    logEvent('INIT', 'Page loaded, waiting for iframe...');
  </script>
</body>
</html>
