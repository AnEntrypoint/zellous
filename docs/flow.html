<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Zellous - Flow UI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236366f1'/><text x='50' y='72' font-size='60' font-weight='700' font-family='sans-serif' fill='white' text-anchor='middle'>Z</text></svg>">
  <link rel="stylesheet" href="css/flow.css">
  <script>
    // Dynamically compute vendor base path
    const scriptDir = new URL(import.meta.url).pathname.split('/').slice(0, -1).join('/');
    const baseUrl = scriptDir.replace(/flow\/?$/, '');
    document.currentScript.before(Object.assign(document.createElement('script'), {
      type: 'importmap',
      textContent: JSON.stringify({
        imports: {
          htm: baseUrl + 'vendor/htm.js',
          preact: baseUrl + 'vendor/preact.mjs',
          '@preact/signals': baseUrl + 'vendor/preact-signals.mjs',
          'nostr-tools': baseUrl + 'vendor/nostr-tools.mjs',
          xstate: baseUrl + 'vendor/xstate.mjs'
        }
      })
    }));
  </script>
  <script>
    window.__zellous = {};
    Object.defineProperty(window, 'lk', { get() { return window.__zellous.voice; }, configurable: true });
    Object.defineProperty(window, 'voice', { get() { return window.__zellous.voice; }, configurable: true });
  </script>
</head>
<body>
  <div class="flow-app">
    <!-- TOP COMMAND BAR -->
    <div class="flow-topbar">
      <div class="topbar-left">
        <div class="server-selector" id="serverSelector">
          <div class="server-selector-icon" id="serverSelectorIcon">Z</div>
          <span id="serverSelectorName">Zellous</span>
        </div>
      </div>

      <div class="topbar-center">
        <input type="text" class="command-palette" id="commandPalette" placeholder="⌘K Search...">
      </div>

      <div class="topbar-right">
        <div class="voice-status" id="voiceStatus">
          <div class="voice-status-dot"></div>
          <span>Offline</span>
        </div>
        <button class="toolbar-btn" id="userMenuBtn" title="Account">👤</button>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flow-content">
      <!-- SIDEBAR -->
      <div class="flow-sidebar" id="flowSidebar">
        <div class="sidebar-section">
          <div class="sidebar-label">Channels</div>
          <div id="channelListFlow" style="display:flex;flex-direction:column;gap:4px;">
            <div class="channel-item active">
              <div class="channel-item-icon">#</div>
              <span>general</span>
            </div>
            <div class="channel-item">
              <div class="channel-item-icon">#</div>
              <span>off-topic</span>
            </div>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-label">Direct Messages</div>
          <div id="dmListFlow" style="display:flex;flex-direction:column;gap:4px;">
            <div class="channel-item">
              <div class="channel-item-icon">👤</div>
              <span>Alice</span>
            </div>
          </div>
        </div>
      </div>

      <!-- MAIN VIEW (Chat or Voice) -->
      <div class="flow-main">
        <!-- CHAT VIEW -->
        <div class="flow-chat" id="chatView">
          <div class="chat-header">
            <div>
              <div class="chat-header-name" id="chatHeaderName"># general</div>
              <div class="chat-header-topic" id="chatHeaderTopic">Topic here</div>
            </div>
            <div class="chat-toolbar">
              <button class="toolbar-btn" id="threadToggleBtn" title="Threads">💬</button>
              <button class="toolbar-btn" id="memberToggleBtn" title="Members">👥</button>
              <button class="toolbar-btn" id="searchBtn" title="Search">🔍</button>
            </div>
          </div>

          <div class="messages-container" id="messagesContainer">
            <div style="text-align:center;color:var(--text-faint);padding:40px 20px;">
              No messages yet. Be the first to say something!
            </div>
          </div>

          <div class="chat-footer">
            <div class="message-input-wrapper">
              <input type="text" class="message-input" id="messageInput" placeholder="Message #general...">
              <div class="input-controls">
                <button class="input-btn" id="attachBtn" title="Upload">📎</button>
                <button class="input-btn" id="sendBtn" title="Send">→</button>
              </div>
            </div>
          </div>
        </div>

        <!-- VOICE VIEW (Hidden by default) -->
        <div class="flow-voice" id="voiceView" style="display:none;">
          <div class="voice-grid-container" id="voiceGridContainer">
            <div class="participant-tile">
              <div class="participant-info">
                <div>You</div>
                <div class="participant-status">
                  <span class="status-badge">🎤 On</span>
                  <span class="status-badge">👁️ Off</span>
                </div>
              </div>
            </div>
          </div>

          <div class="voice-footer">
            <button class="voice-btn" id="voiceMicBtn" title="Mute Mic">🎤</button>
            <button class="voice-btn" id="voiceDeafenBtn" title="Deafen">🔊</button>
            <button class="voice-btn" id="voiceCamBtn" title="Camera">📷</button>
            <button class="voice-btn" id="voiceSettingsBtn" title="Settings">⚙️</button>
            <button class="voice-btn danger" id="voiceLeaveBtn" title="Leave">✕</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modals and Overlays -->
  <div id="modalContainer"></div>

  <script type="module">
    import { signal, computed, effect } from '@preact/signals';

    window.__signal = signal;
    window.__computed = computed;
    window.__effect = effect;

    const { state, config } = await import('./js/state.js');

    import * as NostrTools from 'nostr-tools';
    window.NostrTools = NostrTools;

    import { createMachine, createActor } from 'xstate';
    window.XState = { createMachine, createActor };

    const base = new URL('./', import.meta.url).href;
    window.__appBase = base;
    window.__nostrMode = true;

    // Load modules in order
    const modules = [
      'js/nostr-state-patch.js',
      'js/nostr-auth.js',
      'js/nostr-network.js',
      'js/audio.js',
      'js/nostr-voice.js',
      'js/nostr-voice-rtc.js',
      'js/nostr-chat.js',
      'js/nostr-channels.js',
      'js/ui.js'
    ];

    for (const mod of modules) {
      try {
        await import(base + mod);
      } catch (e) {
        console.warn(`Failed to load ${mod}:`, e.message);
      }
    }

    // Load Flow UI controller as classic script
    try {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = base + 'js/ui-flow.js';
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    } catch (e) {
      console.warn('Failed to load Flow UI controller:', e.message);
    }

    window.appReady = true;
    console.log('🚀 Zellous Flow UI ready');
  </script>
</body>
</html>
